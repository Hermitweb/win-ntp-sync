name: Build WinTimeSync

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x64:
    name: Build (x64)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 make file zip
      shell: bash

    - name: Install Python and Pillow
      run: |
        sudo apt-get install -y python3-pil python3-pip
      shell: bash

    - name: Generate icons
      run: python3 scripts/generate_icons.py
      shell: bash

    - name: Build EXE
      run: |
        make dirs
        make CROSS=x86_64-w64-mingw32-
      shell: bash

    - name: Verify EXE
      run: |
        file build/output/WinTimeSync.exe
        ls -lh build/output/WinTimeSync.exe
        x86_64-w64-mingw32-objdump -p build/output/WinTimeSync.exe 2>&1 | grep -E "Manifest|Version" | head -3 || true
        echo "Verify complete"

    - name: Package release
      run: |
        bash scripts/release.sh x64

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinTimeSync-x64-exe
        path: build/output/WinTimeSync.exe
        if-no-files-found: error

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinTimeSync-x64-zip
        path: build/release/*.zip
        if-no-files-found: error

  build-x86:
    name: Build (x86, optional)
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-i686 make file
      shell: bash

    - name: Install Python and Pillow
      run: |
        sudo apt-get install -y python3-pil python3-pip
      shell: bash

    - name: Generate icons
      run: python3 scripts/generate_icons.py
      shell: bash

    - name: Build EXE
      run: |
        make dirs
        make CROSS=i686-w64-mingw32-
      shell: bash

    - name: Verify EXE
      run: |
        if [ ! -f build/output/WinTimeSync.exe ]; then
          echo "x86 build did not produce WinTimeSync.exe"
          exit 1
        fi
        file build/output/WinTimeSync.exe
        ls -lh build/output/WinTimeSync.exe
        i686-w64-mingw32-objdump -p build/output/WinTimeSync.exe 2>&1 | grep -E "Manifest|Version" | head -3 || true
        echo "Verify complete"

    - name: Upload EXE artifact (unstable, not released)
      uses: actions/upload-artifact@v4
      with:
        name: WinTimeSync-x86-exe-unstable
        path: build/output/WinTimeSync.exe
        if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-x64
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download x64 artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: WinTimeSync ${{ github.ref_name }}
        body: |
          ## WinTimeSync ${{ github.ref_name }}

          Windows NTP 时间同步工具 - 轻量级托盘后台程序

          ### 安装方式
          1. 下载 `WinTimeSync-x64.zip`
          2. 解压后右键 `install.bat` 选择「以管理员身份运行」，或直接双击 `WinTimeSync.exe`
          3. 应用将自动最小化到系统托盘

          ### 系统要求
          - Windows 7 SP1 或更高
          - 管理员权限（修改系统时间需要）
          - UDP 123 出站网络
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/**/*.exe
          artifacts/**/*.zip
